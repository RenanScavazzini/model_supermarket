project:
  name: model_supermarket
  description: Painel interativo para análise de notas fiscais de supermercado
  version: 1.0
  author: Renan Douglas Floriano Scavazzini

data:
  qrcodes_path: data/qrcodes.txt
  fetched_data_path: data/nfce_data_fetched.csv
  qrcode_mapping_path: data/de_para_nfce.csv
  raw_invoice_path: data/notas_fiscais_supermercado.xlsx

# Configurações de busca de dados reais
data_fetching:
  enabled: true                # FETCH_REAL_DATA - Ativa busca no site da Fazenda
  enabled_trat: true          # FETCH_REAL_DATA_TRAT - Ativa tratamento de dados após busca
  delay_between_requests: 1.0  # Delay em segundos entre requisições